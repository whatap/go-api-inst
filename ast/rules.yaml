  # §282 작업1 — cloudwego/eino compose call-site wrap: the model argument
  # passed into a compose builder is wrapped (WrapBaseChatModel) so the graph
  # runtime invokes the WhaTap decorator and extracts response metadata. All
  # five methods take model.BaseChatModel, so the helper accepts/returns
  # BaseChatModel — the argument's static type is unchanged (no compile error).
  # AppendChatModel(node, opts...) → argIndex 0; the rest take (key, node,
  # opts...) → argIndex 1. opts is variadic (maxArgs -1).
  - type: arg-wrap
    target: "github.com/cloudwego/eino/compose.Chain.AppendChatModel"
    with: "whatapeino.WrapBaseChatModel"
    argIndex: 0
    signature: {minArgs: 1, maxArgs: -1}
  - type: arg-wrap
    target: "github.com/cloudwego/eino/compose.Graph.AddChatModelNode"
    with: "whatapeino.WrapBaseChatModel"
    argIndex: 1
    signature: {minArgs: 2, maxArgs: -1}
  - type: arg-wrap
    target: "github.com/cloudwego/eino/compose.Workflow.AddChatModelNode"
    with: "whatapeino.WrapBaseChatModel"
    argIndex: 1
    signature: {minArgs: 2, maxArgs: -1}
  - type: arg-wrap
    target: "github.com/cloudwego/eino/compose.ChainBranch.AddChatModel"
    with: "whatapeino.WrapBaseChatModel"
    argIndex: 1
    signature: {minArgs: 2, maxArgs: -1}
  - type: arg-wrap
    target: "github.com/cloudwego/eino/compose.Parallel.AddChatModel"
    with: "whatapeino.WrapBaseChatModel"
    argIndex: 1
    signature: {minArgs: 2, maxArgs: -1}

