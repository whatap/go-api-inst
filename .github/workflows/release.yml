# GitHub Actions: 자동 릴리스
# 태그 푸시 시 자동으로 바이너리 빌드 및 GitHub Releases에 업로드
#
# 사용법:
#   git tag v0.1.0
#   git push origin v0.1.0

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          # ⚠️ 'latest' 금지 — goreleaser major 점프(v1→v2 등)가 .goreleaser.yaml 스키마를
          # 깨뜨려 릴리즈 실패시킴(v0.6.0 사고). v2.x 안에서만 움직이도록 핀.
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
